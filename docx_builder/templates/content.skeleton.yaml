cover:
  output: "Report_{number}.docx"
  number: "0000000"
  rows:
    - Module Name
    - Assignment Title
    - Lecturer Name
    - Student Name
    - "0000000"
    - "Submission Date"
    - "Creation Date"
  ai_declaration: |-
    Declare AI usage here, or remove this key if not applicable.

styles:
  h1:
    font_size: 14pt
    color: "#000000"
  body:
    font_size: 11pt
    align: justify

sections:

  - call: h1
    text: Introduction

  - call: body
    text: Write the opening paragraph here.

  - call: h2
    text: Subsection

  - call: bullet
    text: First bullet point.

  - call: bullet
    text: Second bullet point.

  - call: figure
    filename: example.png
    label: Figure 1.1
    caption: Example caption.

  - call: h1
    text: References

  - call: reference
    text: Author, A. (2026) 'Title', Publisher. Available at https://example.com (Accessed 20 May 2026).
